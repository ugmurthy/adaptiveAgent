name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release-critical tests
        run: bunx vitest run packages/agent-sdk/src/install/install.test.ts packages/agent-sdk/src/adaptive-agent.test.ts packages/agent-sdk/src/index.test.ts

      - name: Build release assets
        run: ./scripts/build-release-assets.sh

      - name: Smoke test macOS release asset
        run: ./scripts/smoke-release-assets.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          generate_release_notes: true
