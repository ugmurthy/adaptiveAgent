app = "agent-smith-gateway"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  GATEWAY_MODEL_PROVIDER = "mesh"
  GATEWAY_MODEL = "qwen/qwen3.5-27b"
  GATEWAY_REQUEST_LOGGING = "info"
  GATEWAY_REQUEST_LOGGER = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "20s"
    method = "GET"
    path = "/health"
